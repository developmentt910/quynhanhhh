<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chúc Mừng 8-3 Quỳnh Anh!</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #fce4ec;
        font-family: "Arial", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        color: #ec407a;
      }

      /* ----- Nền lấp lánh ----- */
      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image:
          radial-gradient(circle, #ffffff 1.8px, transparent 1.8px),
          radial-gradient(circle, #ffd700 2.5px, transparent 2.5px);
        background-size:
          70px 70px,
          120px 120px;
        background-position:
          0 0,
          35px 60px;
        opacity: 0.3;
        animation:
          moveStars 30s linear infinite,
          sparkle 4s ease-in-out infinite alternate;
        z-index: 1;
      }

      @keyframes moveStars {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(-120px);
        }
      }

      @keyframes sparkle {
        0% {
          opacity: 0.2;
        }
        50% {
          opacity: 0.6;
        }
        100% {
          opacity: 0.2;
        }
      }

      .container {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: none;
        z-index: 2;
        overflow: hidden;
      }

      /* =========================================
         BÓ HOA GÓI GIẤY (Đã thêm hiệu ứng đung đưa)
         ========================================= */
      .new-bouquet {
        position: absolute;
        bottom: 8%;
        left: 50%;
        transform: translateX(-50%) scale(1.5);
        transform-origin: bottom center; /* Gắn tâm chuyển động ở gốc bó hoa */
        width: 300px;
        height: 400px;
        z-index: 20;
      }

      /* Hoạt ảnh đung đưa nhẹ nhàng cho toàn bộ bó hoa */
      @keyframes sway {
        0%,
        100% {
          transform: translateX(-50%) scale(1.5) rotate(-2deg);
        }
        50% {
          transform: translateX(-50%) scale(1.5) rotate(2deg);
        }
      }

      /* Gọi hiệu ứng đung đưa lặp lại vô hạn khi bắt đầu */
      .start-animation .new-bouquet {
        animation: sway 5s ease-in-out infinite;
      }

      /* Bóng mờ dưới đáy */
      .bouquet-shadow {
        position: absolute;
        bottom: 15px;
        left: 50%;
        margin-left: -125px;
        width: 250px;
        height: 25px;
        background: rgba(236, 64, 122, 0.3);
        border-radius: 50%;
        filter: blur(5px);
        z-index: 5;
        opacity: 0;
      }
      .start-animation .bouquet-shadow {
        animation: fadeInText 2s ease forwards 0.5s;
      }

      /* Giấy gói */
      .b-wrapper {
        position: absolute;
        bottom: 20px;
        left: 50%;
        margin-left: -75px;
        width: 150px;
        height: 180px;
        background: #d4a373;
        clip-path: polygon(0 0, 100% 0, 65% 100%, 35% 100%);
        border-radius: 10px;
        transform-origin: bottom center;
        transform: scale(0);
        z-index: 10;
        box-shadow: inset 0 -20px 30px rgba(0, 0, 0, 0.2);
      }
      .b-wrapper::after {
        content: "";
        position: absolute;
        top: 0;
        left: 50%;
        width: 2px;
        height: 100%;
        background: rgba(0, 0, 0, 0.1);
      }

      /* Nơ */
      .b-bow {
        position: absolute;
        bottom: 30px;
        left: 50%;
        margin-left: -35px;
        width: 70px;
        height: 40px;
        z-index: 15;
        transform: scale(0);
      }
      .bow-left,
      .bow-right {
        position: absolute;
        top: 5px;
        width: 35px;
        height: 25px;
        background: #ff4d6d;
        border-radius: 20px;
      }
      .bow-left {
        left: 0;
        transform: rotate(-15deg);
      }
      .bow-right {
        right: 0;
        transform: rotate(15deg);
      }
      .bow-center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 15px;
        height: 15px;
        background: #c9184a;
        border-radius: 50%;
      }

      /* Cấu trúc Hoa */
      .b-flower {
        position: absolute;
        transform: scale(0);
        z-index: 12;
      }
      .b-flower .petal {
        position: absolute;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        left: -20px;
        top: -20px;
      }
      .b-flower .petal:nth-child(1) {
        transform: translateY(-20px);
      }
      .b-flower .petal:nth-child(2) {
        transform: rotate(72deg) translateY(-20px);
      }
      .b-flower .petal:nth-child(3) {
        transform: rotate(144deg) translateY(-20px);
      }
      .b-flower .petal:nth-child(4) {
        transform: rotate(216deg) translateY(-20px);
      }
      .b-flower .petal:nth-child(5) {
        transform: rotate(288deg) translateY(-20px);
      }

      .b-flower .center {
        position: absolute;
        width: 20px;
        height: 20px;
        background: #ffea00;
        border-radius: 50%;
        left: -10px;
        top: -10px;
        box-shadow: inset 0 0 5px #d4af37;
        z-index: 2;
      }

      /* Tọa độ 7 bông hoa */
      .f-bl {
        bottom: 175px;
        left: 115px;
        z-index: 13;
      }
      .f-bl .petal {
        background: #ffea00;
      }

      .f-br {
        bottom: 175px;
        left: 185px;
        z-index: 13;
      }
      .f-br .petal {
        background: #ff3385;
      }

      .f-ml {
        bottom: 220px;
        left: 85px;
        z-index: 12;
      }
      .f-ml .petal {
        background: #ff9933;
      }

      .f-mr {
        bottom: 220px;
        left: 215px;
        z-index: 12;
      }
      .f-mr .petal {
        background: #4da6ff;
      }

      .f-tl {
        bottom: 265px;
        left: 110px;
        z-index: 11;
      }
      .f-tl .petal {
        background: #ff4d4d;
      }

      .f-tr {
        bottom: 265px;
        left: 190px;
        z-index: 11;
      }
      .f-tr .petal {
        background: #b366ff;
      }

      .f-c {
        bottom: 225px;
        left: 150px;
        z-index: 14;
      }
      .f-c .petal {
        background: #ff99cc;
      }

      /* ----- HOẠT ẢNH CHO CÁC THÀNH PHẦN HOA ----- */
      @keyframes popUp {
        0% {
          transform: scale(0);
        }
        70% {
          transform: scale(1.15);
        }
        100% {
          transform: scale(1);
        }
      }

      .start-animation .b-wrapper {
        animation: popUp 0.8s ease forwards 0.5s;
      }
      .start-animation .b-bow {
        animation: popUp 0.6s ease forwards 1.2s;
      }

      .start-animation .f-bl {
        animation: popUp 0.6s ease forwards 1.5s;
      }
      .start-animation .f-br {
        animation: popUp 0.6s ease forwards 1.7s;
      }
      .start-animation .f-ml {
        animation: popUp 0.6s ease forwards 1.9s;
      }
      .start-animation .f-mr {
        animation: popUp 0.6s ease forwards 2.1s;
      }
      .start-animation .f-tl {
        animation: popUp 0.6s ease forwards 2.3s;
      }
      .start-animation .f-tr {
        animation: popUp 0.6s ease forwards 2.5s;
      }
      .start-animation .f-c {
        animation: popUp 0.6s ease forwards 2.8s;
      }

      /* ----- Tim bay quanh hoa ----- */
      .floating-heart {
        position: absolute;
        opacity: 0;
        transform: scale(0);
        z-index: 25;
      }
      .heart-shape {
        width: 30px;
        height: 30px;
        background-color: rgba(236, 64, 122, 0.6);
        transform: rotate(45deg);
      }
      .heart-shape::before,
      .heart-shape::after {
        content: "";
        position: absolute;
        width: 30px;
        height: 30px;
        background-color: rgba(236, 64, 122, 0.6);
        border-radius: 50%;
      }
      .heart-shape::before {
        top: -15px;
        left: 0;
      }
      .heart-shape::after {
        top: 0;
        left: -15px;
      }

      @keyframes floatHeart {
        0% {
          transform: scale(0) translateY(0);
          opacity: 0;
        }
        20% {
          opacity: 1;
        }
        100% {
          transform: scale(1) translateY(-30px);
          opacity: 1;
        }
      }

      .start-animation .heart-1 {
        bottom: 200px;
        left: 0px;
        animation: floatHeart 4s ease forwards 3s;
      }
      .start-animation .heart-2 {
        bottom: 300px;
        right: -20px;
        transform: scale(0.6);
        animation: floatHeart 4s ease forwards 3.5s;
      }
      .start-animation .heart-3 {
        bottom: 350px;
        right: 50px;
        transform: scale(0.8);
        animation: floatHeart 4s ease forwards 4s;
      }

      /* ----- Lời chúc ----- */
      .message {
        position: absolute;
        top: 8%;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        color: #d81b60;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        z-index: 21;
        width: 100%;
      }

      .message h1,
      .message h2 {
        margin: 10px 0;
        opacity: 0;
      }
      .start-animation .message h1 {
        font-size: 2.8em;
        animation: fadeInText 2s ease forwards 4s;
      }
      .start-animation .message h2 {
        font-size: 2em;
        animation: fadeInText 2s ease forwards 5s;
      }

      @keyframes fadeInText {
        0% {
          opacity: 0;
          transform: translateY(20px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ----- Các ảnh lặp lại ----- */
      .image-wrapper {
        position: absolute;
        width: 160px;
        border-radius: 10px;
        border: 2px solid rgba(236, 64, 122, 0.3);
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        z-index: 5;
        bottom: -200px;
        opacity: 0;
      }
      .image-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      @keyframes floatUp {
        0% {
          bottom: -200px;
          opacity: 0;
          transform: scale(0.8);
        }
        20% {
          opacity: 1;
          transform: scale(1);
        }
        80% {
          opacity: 1;
        }
        100% {
          bottom: 110%;
          opacity: 0;
          transform: scale(0.8);
        }
      }

      .start-animation .img-1 {
        left: 5%;
        animation: floatUp 7s linear infinite 1s;
      }
      .start-animation .img-2 {
        right: 15%;
        animation: floatUp 6s linear infinite 3s;
      }
      .start-animation .img-3 {
        right: 10%;
        animation: floatUp 8s linear infinite 2s;
      }
      .start-animation .img-4 {
        right: 5%;
        animation: floatUp 5s linear infinite 4s;
      }
      .start-animation .img-5 {
        left: 10%;
        animation: floatUp 7s linear infinite 1.5s;
      }
      .start-animation .img-6 {
        right: 20%;
        animation: floatUp 6s linear infinite 3.5s;
      }
      .start-animation .img-7 {
        left: 25%;
        animation: floatUp 8s linear infinite 2.5s;
      }

      /* ----- Nút Bắt Đầu ----- */
      #startButton {
        padding: 15px 40px;
        font-size: 1.2em;
        background-color: #ff80ab;
        color: #fff;
        font-weight: bold;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        box-shadow: 0 0 15px rgba(255, 128, 171, 0.4);
        transition: all 0.3s;
        z-index: 100;
      }
      #startButton:hover {
        transform: scale(1.05);
        box-shadow: 0 0 25px rgba(255, 128, 171, 0.6);
      }
    </style>
  </head>
  <body>
    <button id="startButton">Mở Quà Nhé!</button>

    <audio id="bgMusic" src="./nhac.mp3" preload="auto"></audio>

    <div class="container" id="mainContainer">
      <div class="new-bouquet">
        <div class="bouquet-shadow"></div>

        <div class="b-wrapper"></div>

        <div class="b-flower f-bl">
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="center"></div>
        </div>
        <div class="b-flower f-br">
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="center"></div>
        </div>
        <div class="b-flower f-ml">
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="center"></div>
        </div>
        <div class="b-flower f-mr">
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="center"></div>
        </div>
        <div class="b-flower f-tl">
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="center"></div>
        </div>
        <div class="b-flower f-tr">
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="center"></div>
        </div>
        <div class="b-flower f-c">
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="center"></div>
        </div>

        <div class="b-bow">
          <div class="bow-left"></div>
          <div class="bow-right"></div>
          <div class="bow-center"></div>
        </div>

        <div class="floating-heart heart-1">
          <div class="heart-shape"></div>
        </div>
        <div class="floating-heart heart-2">
          <div class="heart-shape"></div>
        </div>
        <div class="floating-heart heart-3">
          <div class="heart-shape"></div>
        </div>
      </div>

      <div class="message">
        <h1>8-3 Vuiii vẻee!</h1>
        <h2>Quỳnh Anh xinh gáiiii!</h2>
      </div>

      <div class="image-wrapper img-1">
        <img
          src="./z7584195795695_817f2fc7489a53e35debc12c4ab861a9.jpg"
          alt="Ảnh 1"
        />
      </div>
      <div class="image-wrapper img-2">
        <img
          src="./z7584195803452_f0c32438f012464e44b179827f9e0faf.jpg"
          alt="Ảnh 2"
        />
      </div>
      <div class="image-wrapper img-3">
        <img
          src="./z7584195809041_3573da8a5831b6e38da02c2fecae1991.jpg"
          alt="Ảnh 3"
        />
      </div>
      <div class="image-wrapper img-4">
        <img
          src="./z7584195846781_e17f757ef396647688f078d3b5795a79.jpg"
          alt="Ảnh 4"
        />
      </div>
      <div class="image-wrapper img-5">
        <img
          src="./z7584195846864_025a829525e185feb12d6235cbe46a8a.jpg"
          alt="Ảnh 5"
        />
      </div>
      <div class="image-wrapper img-6">
        <img
          src="./z7584195854536_d7d5a49d7fbd89f5efc1cc74a198c095.jpg"
          alt="Ảnh 6"
        />
      </div>
      <div class="image-wrapper img-7">
        <img
          src="./z7584195858871_0eda997220daefabdbf3c89a642a4115.jpg"
          alt="Ảnh 7"
        />
      </div>
    </div>

    <script>
      document
        .getElementById("startButton")
        .addEventListener("click", function () {
          this.style.display = "none";
          var container = document.getElementById("mainContainer");
          container.style.display = "block";

          setTimeout(function () {
            container.classList.add("start-animation");
          }, 50);

          var audio = document.getElementById("bgMusic");
          audio.play().catch(function (error) {
            console.log("Trình duyệt chặn tự động phát nhạc: ", error);
          });
        });
    </script>
  </body>
</html>
